services:
  backend:
    build:
      context: backend
      target: dev
    ports:
      - '8000:8000'
    env_file: .env
    environment:
      # Point the app at the Postgres service (async driver), overriding the default.
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/app
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  ui:
    build:
      context: ui
      target: dev
    ports:
      - '3000:3000'
    environment:
      # Vite dev-server proxies /api to this address (see ui/vite.config.ts).
      BACKEND_URL: http://backend:8000
    volumes:
      - ./ui:/app
      - /app/node_modules
    depends_on:
      - backend

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
