services:
  backend:
    build:
      context: backend
      target: dev
    ports:
      - '8000:8000'
    env_file: .env
    environment:
      # Point the app at the Postgres service (async driver), overriding the default.
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/app
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  ui:
    build:
      context: ui
      target: dev
    ports:
      - '3000:3000'
    environment:
      # Nitro /api proxy target. Override for merchant mode (host API):
      # BACKEND_URL=http://host.docker.internal:8000
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
      # Browser calls API directly (bypasses proxy). Set for merchant mode:
      # VITE_API_URL=http://localhost:8000/api
      VITE_API_URL: ${VITE_API_URL:-}
    volumes:
      - ./ui:/app
      - /app/node_modules
    depends_on:
      - backend

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
