services:
  app:
    build:
      context: .
      target: dev
    ports:
      - '8000:8000'
    env_file: .env
    environment:
      # Point the app at the Postgres service (async driver), overriding the default.
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/app
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
